<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Ralo Swap | DeFi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        body { background-color: #000000; color: white; font-family: sans-serif; }
        .sidebar-item { transition: 0.3s; cursor: pointer; border-radius: 12px; }
        .active-tab { background-color: #1a1a1a; color: #d4ff33 !important; border-left: 4px solid #d4ff33; }
        .glass-card { background: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 24px; }
        .neon-btn { background-color: #d4ff33; color: black; font-weight: bold; transition: 0.3s; }
        .neon-btn:hover { box-shadow: 0 0 20px rgba(212, 255, 51, 0.4); }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <!-- SIDEBAR (Desktop) -->
    <aside class="w-64 border-r border-gray-900 p-6 hidden md:flex flex-col gap-8">
        <div class="text-xl font-black italic text-[#d4ff33]">ARC RALO</div>
        <nav class="flex flex-col gap-2">
            <div onclick="switchTab('portfolio')" id="tab-portfolio" class="sidebar-item p-4 text-gray-400">💼 Portfolio</div>
            <div onclick="switchTab('swap')" id="tab-swap" class="sidebar-item p-4 active-tab">⇌ Swap</div>
            <div onclick="switchTab('liquidity')" id="tab-liquidity" class="sidebar-item p-4 text-gray-400">🌊 Liquidity</div>
            <div onclick="switchTab('history')" id="tab-history" class="sidebar-item p-4 text-gray-400">🕒 History</div>
        </nav>
    </aside>

    <!-- MOBILE HEADER -->
    <div class="md:hidden p-4 border-b border-gray-900 flex justify-between items-center bg-black sticky top-0 z-50">
        <div class="text-[#d4ff33] font-bold italic">ARC RALO</div>
        <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="text-white text-2xl">☰</button>
    </div>

    <!-- MOBILE MENU -->
    <div id="mobile-menu" class="hidden md:hidden bg-black border-b border-gray-900 p-4 absolute top-16 w-full z-40">
        <div onclick="switchTab('portfolio')" class="p-3 text-gray-400">Portfolio</div>
        <div onclick="switchTab('swap')" class="p-3 text-white">Swap</div>
        <div onclick="switchTab('liquidity')" class="p-3 text-gray-400">Liquidity</div>
        <div onclick="switchTab('history')" class="p-3 text-gray-400">History</div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="flex-1 p-4 md:p-10">
        <div class="flex justify-end mb-8">
            <button id="connectWallet" class="bg-[#1a1a1a] px-6 py-2 rounded-full text-sm border border-gray-800">Connect Wallet</button>
        </div>

        <!-- SECTIONS -->
        <div id="section-swap" class="section flex justify-center">
            <div class="w-full max-w-md glass-card p-6">
                <h3 class="mb-6 font-bold text-gray-400 uppercase tracking-tighter">Swap Tokens</h3>
                <div class="bg-black p-4 rounded-xl mb-2 border border-gray-900">
                    <input id="inputAmount" type="number" placeholder="0.00" class="bg-transparent text-2xl w-full outline-none">
                </div>
                <div class="text-center my-2 text-[#d4ff33]">↓</div>
                <div class="bg-black p-4 rounded-xl border border-gray-900 mb-6">
                    <input id="outputAmount" type="text" placeholder="0.00" readonly class="bg-transparent text-2xl w-full outline-none text-gray-500">
                </div>
                <button id="swapBtn" class="w-full neon-btn py-4 rounded-xl uppercase italic">Review Swap</button>
            </div>
        </div>

        <div id="section-portfolio" class="section hidden">
            <h2 class="text-2xl font-bold mb-6">Your Portfolio</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="glass-card p-6">
                    <p class="text-gray-500 text-sm">USDC Balance</p>
                    <p id="usdc-bal" class="text-3xl font-black mt-2">0.00</p>
                </div>
                <div class="glass-card p-6">
                    <p class="text-gray-500 text-sm">EURC Balance</p>
                    <p id="eurc-bal" class="text-3xl font-black mt-2">0.00</p>
                </div>
            </div>
        </div>

        <div id="section-liquidity" class="section hidden">
            <h2 class="text-2xl font-bold mb-6 italic">Liquidity Pools</h2>
            <div class="glass-card p-10 text-center text-gray-600">
                Connect Wallet to view active pools.
            </div>
        </div>

        <div id="section-history" class="section hidden">
            <h2 class="text-2xl font-bold mb-6">Transaction History</h2>
            <div class="glass-card overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-[#1a1a1a] text-xs text-gray-500 uppercase">
                        <tr><th class="p-4">Action</th><th class="p-4">Amount</th><th class="p-4">Status</th></tr>
                    </thead>
                    <tbody id="history-rows">
                        <tr><td colspan="3" class="p-10 text-center text-gray-600">No activity yet.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
