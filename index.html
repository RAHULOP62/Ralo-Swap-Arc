<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RALO SWAP ARC DEX</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f9ff;
            background-image:
                radial-gradient(circle at 0% 0%, #dcfce7 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, #e0f2fe 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .logo-gradient {
            background: linear-gradient(135deg, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .capsule-nav {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.8);
        }

        input[type="number"]::-webkit-inner-spin-button {
            display: none;
        }

    </style>

</head>

<body class="text-slate-800">

    <!-- NAVBAR -->

    <nav class="flex justify-between items-center px-6 md:px-12 py-6 sticky top-0 z-50">

        <div class="logo-gradient font-black text-3xl tracking-tighter">
            RALOSWAP
        </div>

        <div class="hidden md:flex items-center gap-1 capsule-nav p-1.5 rounded-full shadow-sm">

            <button
                onclick="switchTab('swap')"
                id="tab-swap"
                class="px-6 py-2 text-sm font-bold rounded-full transition-all text-emerald-500">

                Swap

            </button>

            <button
                onclick="switchTab('history')"
                id="tab-history"
                class="px-6 py-2 text-sm font-bold rounded-full transition-all text-slate-500">

                History

            </button>

        </div>

        <button
            id="connectBtn"
            onclick="connectWallet()"
            class="bg-slate-900 text-white px-6 py-3 rounded-xl text-sm font-bold shadow-lg hover:opacity-90 active:scale-95 transition-all">

            Connect Wallet

        </button>

    </nav>

    <!-- MAIN -->

    <main class="max-w-lg mx-auto px-4 mt-8 pb-20">

        <!-- SWAP -->

        <div
            id="swap-container"
            class="bg-white p-6 rounded-[32px] shadow-[0_20px_50px_rgba(16,185,129,0.1)] border border-white">

            <div class="flex justify-between items-center mb-6">

                <h2 class="font-extrabold text-xl text-slate-800">
                    Swap
                </h2>

                <button class="p-2 bg-slate-100 rounded-xl">
                    ⚙️
                </button>

            </div>

            <!-- FROM -->

            <div class="bg-slate-50 p-5 rounded-3xl border-2 border-transparent focus-within:border-emerald-500">

                <div class="flex justify-between text-xs font-bold text-slate-400 mb-2 uppercase">

                    <span>You Pay</span>

                    <span id="from-balance">
                        Balance: 0.00
                    </span>

                </div>

                <div class="flex items-center gap-3">

                    <input
                        type="number"
                        id="fromAmount"
                        placeholder="0"
                        class="bg-transparent border-none text-3xl font-bold w-full outline-none"
                        oninput="calculateSwap()">

                    <div class="flex items-center gap-2 bg-white border border-slate-200 px-3 py-1.5 rounded-2xl shadow-sm font-bold text-sm">

                        <div
                            id="from-icon"
                            class="w-6 h-6 rounded-full bg-blue-500">
                        </div>

                        <span id="from-symbol">
                            ARC
                        </span>

                    </div>

                </div>

            </div>

            <!-- FLIP -->

            <div class="flex justify-center -my-5 relative z-10">

                <button
                    onclick="flipTokens()"
                    class="w-10 h-10 flex items-center justify-center bg-white border-4 border-slate-50 rounded-2xl shadow-md hover:shadow-lg text-emerald-500 font-bold">

                    ↓

                </button>

            </div>

            <!-- TO -->

            <div class="bg-slate-50 p-5 rounded-3xl mt-3">

                <div class="flex justify-between text-xs font-bold text-slate-400 mb-2 uppercase">

                    <span>You Receive</span>

                    <span id="to-balance">
                        Balance: 0.00
                    </span>

                </div>

                <div class="flex items-center gap-3">

                    <input
                        type="number"
                        id="toAmount"
                        placeholder="0"
                        readonly
                        class="bg-transparent border-none text-3xl font-bold w-full outline-none">

                    <div class="flex items-center gap-2 bg-white border border-slate-200 px-3 py-1.5 rounded-2xl shadow-sm font-bold text-sm">

                        <div
                            id="to-icon"
                            class="w-6 h-6 rounded-full bg-emerald-500">
                        </div>

                        <span id="to-symbol">
                            RALO
                        </span>

                    </div>

                </div>

            </div>

            <!-- BUTTON -->

            <button
                id="actionBtn"
                onclick="handleSwap()"
                class="w-full mt-6 py-5 rounded-[20px] font-black text-lg bg-slate-100 text-slate-400 shadow-lg">

                Connect Wallet

            </button>

            <!-- DETAILS -->

            <div class="mt-8 pt-6 border-t border-slate-100 space-y-3">

                <div class="flex justify-between text-sm font-medium text-slate-500">

                    <span>Exchange Rate</span>

                    <span
                        id="rate-display"
                        class="font-bold text-slate-800">

                        1 ARC = 2 RALO

                    </span>

                </div>

                <div class="flex justify-between text-sm font-medium text-slate-500">

                    <span>Price Impact</span>

                    <span class="font-bold text-emerald-500">
                        -0.01%
                    </span>

                </div>

                <div class="flex justify-between text-sm font-medium text-slate-500">

                    <span>Network Fee</span>

                    <span class="font-bold text-slate-800">
                        FREE
                    </span>

                </div>

            </div>

        </div>

        <!-- HISTORY -->

        <div
            id="history-container"
            class="hidden bg-white rounded-[32px] shadow-xl border border-slate-100 overflow-hidden mt-6">

            <div class="p-6 border-b border-slate-100">

                <h2 class="font-bold text-xl">
                    History
                </h2>

            </div>

            <div
                id="tx-list"
                class="divide-y divide-slate-50 max-h-[400px] overflow-y-auto p-4 text-center text-slate-400">

                No transactions yet.

            </div>

        </div>

    </main>

    <!-- ETHERS -->

    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>

    <!-- SCRIPT -->

    <script>

        const ARC_CONFIG = {
            chainId: '0x32',
            chainName: 'Arc Testnet',
            nativeCurrency: {
                name: 'ARC',
                symbol: 'ARC',
                decimals: 18
            },
            rpcUrls: ['https://rpc-testnet.arc.network/'],
            blockExplorerUrls: ['https://explorer-testnet.arc.network/']
        };

        const TOKENS = {

            ARC: {
                symbol: 'ARC',
                icon: 'bg-blue-500',
                rate: 2
            },

            RALO: {
                symbol: 'RALO',
                icon: 'bg-emerald-500',
                rate: 0.5
            }

        };

        let provider;
        let signer;
        let userAddress = null;

        let fromToken = 'ARC';
        let toToken = 'RALO';

        async function connectWallet() {

            if (!window.ethereum) {
                alert("Install MetaMask");
                return;
            }

            try {

                provider =
                    new ethers.providers.Web3Provider(window.ethereum);

                const network =
                    await provider.getNetwork();

                if (network.chainId !== 50) {

                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [ARC_CONFIG]
                    });

                }

                const accounts =
                    await provider.send(
                        "eth_requestAccounts",
                        []
                    );

                userAddress = accounts[0];

                signer = provider.getSigner();

                updateUI();

                fetchBalances();

            } catch (err) {

                console.log(err);

                alert("Wallet connection failed");
            }
        }

        async function fetchBalances() {

            if (!userAddress) return;

            try {

                const balance =
                    await provider.getBalance(userAddress);

                const formatted =
                    parseFloat(
                        ethers.utils.formatEther(balance)
                    ).toFixed(4);

                document.getElementById(
                    'from-balance'
                ).innerText =
                    `Balance: ${formatted}`;

                document.getElementById(
                    'to-balance'
                ).innerText =
                    `Balance: ${formatted}`;

            } catch (err) {

                console.log(err);
            }
        }

        function calculateSwap() {

            const amount =
                parseFloat(
                    document.getElementById('fromAmount').value
                );

            if (!amount || amount <= 0) {

                document.getElementById(
                    'toAmount'
                ).value = '';

                return;
            }

            const output =
                amount * TOKENS[fromToken].rate;

            document.getElementById(
                'toAmount'
            ).value =
                output.toFixed(4);

            updateActionButton();
        }

        function flipTokens() {

            [fromToken, toToken] =
                [toToken, fromToken];

            document.getElementById(
                'from-symbol'
            ).innerText = fromToken;

            document.getElementById(
                'to-symbol'
            ).innerText = toToken;

            document.getElementById(
                'from-icon'
            ).className =
                `w-6 h-6 rounded-full ${TOKENS[fromToken].icon}`;

            document.getElementById(
                'to-icon'
            ).className =
                `w-6 h-6 rounded-full ${TOKENS[toToken].icon}`;

            document.getElementById(
                'rate-display'
            ).innerText =
                `1 ${fromToken} = ${TOKENS[fromToken].rate} ${toToken}`;

            calculateSwap();
        }

        async function handleSwap() {

            if (!userAddress) {
                connectWallet();
                return;
            }

            const amount =
                document.getElementById('fromAmount').value;

            if (!amount || amount <= 0) {

                alert("Enter amount");

                return;
            }

            const btn =
                document.getElementById('actionBtn');

            btn.innerText = "Swapping...";
            btn.disabled = true;

            await new Promise(resolve =>
                setTimeout(resolve, 2000)
            );

            addHistory(
                fromToken,
                toToken,
                amount
            );

            alert("Swap Successful");

            document.getElementById(
                'fromAmount'
            ).value = '';

            document.getElementById(
                'toAmount'
            ).value = '';

            updateActionButton();
        }

        function addHistory(from, to, amount) {

            const list =
                document.getElementById('tx-list');

            if (
                list.innerText.includes(
                    'No transactions'
                )
            ) {
                list.innerHTML = '';
            }

            const received =
                document.getElementById(
                    'toAmount'
                ).value;

            const html = `
                <div class="p-4 flex items-center justify-between hover:bg-slate-50 rounded-2xl">

                    <div class="text-left">

                        <div class="font-bold">
                            ${from} → ${to}
                        </div>

                        <div class="text-xs text-slate-400">
                            ${amount} ${from} → ${received} ${to}
                        </div>

                    </div>

                    <span class="text-emerald-500 text-xs font-bold uppercase">
                        Success
                    </span>

                </div>
            `;

            list.innerHTML =
                html + list.innerHTML;
        }

        function switchTab(tab) {

            document
                .querySelectorAll('.capsule-nav button')
                .forEach(btn => {

                    btn.classList.remove(
                        'text-emerald-500'
                    );

                    btn.classList.add(
                        'text-slate-500'
                    );
                });

            document
                .getElementById(`tab-${tab}`)
                .classList.remove('text-slate-500');

            document
                .getElementById(`tab-${tab}`)
                .classList.add('text-emerald-500');

            document
                .getElementById('swap-container')
                .classList.toggle(
                    'hidden',
                    tab !== 'swap'
                );

            document
                .getElementById('history-container')
                .classList.toggle(
                    'hidden',
                    tab !== 'history'
                );
        }

        function updateUI() {

            const btn =
                document.getElementById('connectBtn');

            if (userAddress) {

                btn.innerText =
                    userAddress.slice(0,6)
                    + "..."
                    + userAddress.slice(-4);

                btn.classList.remove(
                    'bg-slate-900'
                );

                btn.classList.add(
                    'bg-emerald-500'
                );
            }

            updateActionButton();
        }

        function updateActionButton() {

            const btn =
                document.getElementById('actionBtn');

            const amount =
                document.getElementById('fromAmount').value;

            if (!userAddress) {

                btn.innerText =
                    "Connect Wallet";

                btn.disabled = false;

                btn.className =
                    "w-full mt-6 py-5 rounded-[20px] font-black text-lg btn-gradient text-white shadow-lg";

            }

            else if (!amount) {

                btn.innerText =
                    "Enter Amount";

                btn.disabled = true;

                btn.className =
                    "w-full mt-6 py-5 rounded-[20px] font-black text-lg bg-slate-100 text-slate-400";

            }

            else {

                btn.innerText =
                    "Swap Now";

                btn.disabled = false;

                btn.className =
                    "w-full mt-6 py-5 rounded-[20px] font-black text-lg btn-gradient text-white shadow-lg";
            }
        }

        updateActionButton();

    </script>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>

<script src="app.js"></script>

</body>
</html>
