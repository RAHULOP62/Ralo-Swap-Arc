<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RALO SWAP arc- Arc Testnet DEX</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f9ff;
            background-image: 
                radial-gradient(circle at 0% 0%, #dcfce7 0%, transparent 40%), 
                radial-gradient(circle at 100% 100%, #e0f2fe 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        .logo-gradient {
            background: linear-gradient(135deg, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        .capsule-nav {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
    </style>
</head>
<body class="text-slate-800">

    <!-- Navigation -->
    <nav class="flex justify-between items-center px-6 md:px-12 py-6 sticky top-0 z-50">
        <div class="logo-gradient font-black text-3xl tracking-tighter">RALOSWAP</div>
        
        <div class="hidden md:flex items-center gap-1 capsule-nav p-1.5 rounded-full shadow-sm">
            <button onclick="switchTab('swap')" id="tab-swap" class="px-6 py-2 text-sm font-bold rounded-full transition-all text-emerald-500">Swap</button>
            <button onclick="switchTab('liquidity')" id="tab-liquidity" class="px-6 py-2 text-sm font-bold rounded-full transition-all text-slate-500">Liquidity</button>
            <button onclick="switchTab('history')" id="tab-history" class="px-6 py-2 text-sm font-bold rounded-full transition-all text-slate-500">History</button>
        </div>

        <div class="flex items-center gap-3">
            <div id="networkWarning" class="hidden lg:flex items-center gap-1.5 px-3 py-1.5 bg-amber-50 text-amber-600 rounded-full text-xs font-bold border border-amber-200">
                <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                Wrong Network
            </div>
            <button id="connectBtn" onclick="connectWallet()" class="bg-slate-900 text-white px-6 py-3 rounded-xl text-sm font-bold shadow-lg hover:opacity-90 active:scale-95 transition-all flex items-center gap-2">
                Connect Wallet
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-lg mx-auto px-4 mt-8 pb-20">
        
        <!-- Swap UI -->
        <div id="swap-container" class="bg-white p-6 rounded-[32px] shadow-[0_20px_50px_rgba(16,185,129,0.1)] border border-white">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-extrabold text-xl text-slate-800">Swap</h2>
                <button class="p-2 bg-slate-100/50 rounded-xl text-slate-400">⚙️</button>
            </div>

            <!-- From Input -->
            <div class="bg-slate-50 p-5 rounded-3xl border-2 border-transparent transition-all focus-within:border-emerald-500 focus-within:bg-white">
                <div class="flex justify-between text-xs font-bold text-slate-400 mb-2 uppercase">
                    <span>You Pay</span>
                    <span id="from-balance">Balance: 0.00</span>
                </div>
                <div class="flex items-center gap-3">
                    <input type="number" id="fromAmount" placeholder="0" class="bg-transparent border-none text-3xl font-bold w-full outline-none" oninput="calculateSwap()">
                    <div class="flex items-center gap-2 bg-white border border-slate-200 px-3 py-1.5 rounded-2xl shadow-sm font-bold text-sm">
                        <div id="from-icon" class="w-6 h-6 rounded-full bg-blue-500 shadow-sm"></div>
                        <span id="from-symbol">USDC</span>
                    </div>
                </div>
            </div>

            <!-- Divider -->
            <div class="flex justify-center -my-5 relative z-10">
                <button onclick="flipTokens()" class="w-10 h-10 flex items-center justify-center bg-white border-4 border-slate-50 rounded-2xl shadow-md hover:shadow-lg text-emerald-500 transition-all font-bold">↓</button>
            </div>

            <!-- To Input -->
            <div class="bg-slate-50 p-5 rounded-3xl mt-3">
                <div class="flex justify-between text-xs font-bold text-slate-400 mb-2 uppercase">
                    <span>You Receive</span>
                    <span id="to-balance">Balance: 0.00</span>
                </div>
                <div class="flex items-center gap-3">
                    <input type="number" id="toAmount" placeholder="0" class="bg-transparent border-none text-3xl font-bold w-full outline-none" readonly>
                    <div class="flex items-center gap-2 bg-white border border-slate-200 px-3 py-1.5 rounded-2xl shadow-sm font-bold text-sm">
                        <div id="to-icon" class="w-6 h-6 rounded-full bg-emerald-500 shadow-sm"></div>
                        <span id="to-symbol">EURC</span>
                    </div>
                </div>
            </div>

            <!-- Action Button -->
            <button id="actionBtn" onclick="handleSwap()" class="w-full mt-6 py-5 rounded-[20px] font-black text-lg bg-slate-100 text-slate-400 transition-all active:scale-95 shadow-lg">
                Connect Wallet
            </button>

            <!-- Details -->
            <div class="mt-8 pt-6 border-t border-slate-100 space-y-3">
                <div class="flex justify-between text-sm font-medium text-slate-500">
                    <span>Exchange Rate</span>
                    <span id="rate-display" class="font-bold text-slate-800">1 USDC = 0.92 EURC</span>
                </div>
                <div class="flex justify-between text-sm font-medium text-slate-500">
                    <span>Price Impact</span>
                    <span class="font-bold text-emerald-500">-0.01%</span>
                </div>
                <div class="flex justify-between text-sm font-medium text-slate-500">
                    <span>Network Fee <span class="px-2 py-0.5 rounded-md bg-emerald-100 text-emerald-700 text-[10px] font-black ml-1">FREE</span></span>
                    <span class="font-bold text-slate-800">$0.00</span>
                </div>
                <div class="pt-2 text-[10px] font-mono text-slate-400 text-center uppercase tracking-widest">
                    Route: USDC ➜ StableFX ➜ EURC
                </div>
            </div>
        </div>

        <!-- History UI -->
        <div id="history-container" class="hidden bg-white rounded-[32px] shadow-xl border border-slate-100 overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h2 class="font-bold text-xl">History</h2>
            </div>
            <div id="tx-list" class="divide-y divide-slate-50 max-h-[400px] overflow-y-auto p-4 text-center text-slate-400">
                No transactions yet.
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-12 text-center">
            <p class="text-[10px] font-black text-slate-400 tracking-widest uppercase">
                RALOSWAP TESTNET V1.0 • POWERED BY RALO NETWORK
            </p>
        </div>

    </main>

    <!-- Scripts -->
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <script>
        const ARC_CONFIG = {
            chainId: '0x32', // Chain ID 50
            chainName: 'Arc Testnet',
            nativeCurrency: { name: 'ARC', symbol: 'ARC', decimals: 18 },
            rpcUrls: ['https://rpc-testnet.arc.network/'], 
            blockExplorerUrls: ['https://explorer-testnet.arc.network/'],
        };

        const TOKENS = {
            USDC: { symbol: 'USDC', address: '0x3600000000000000000000000000000000000000', icon: 'bg-blue-500', rate: 0.92 },
            EURC: { symbol: 'EURC', address: '0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a', icon: 'bg-emerald-500', rate: 1.08 }
        };

        let userAddress = null;
        let fromToken = 'USDC';
        let toToken = 'EURC';
        let provider, signer;

        async function connectWallet() {
            if (!window.ethereum) {
                alert("Please install MetaMask!");
                return;
            }

            provider = new ethers.providers.Web3Provider(window.ethereum);
            
            try {
                // Check Network
                const { chainId } = await provider.getNetwork();
                if (chainId !== 50) {
                    try {
                        await window.ethereum.request({
                            method: 'wallet_switchEthereumChain',
                            params: [{ chainId: ARC_CONFIG.chainId }],
                        });
                    } catch (err) {
                        if (err.code === 4902) {
                            await window.ethereum.request({
                                method: 'wallet_addEthereumChain',
                                params: [ARC_CONFIG],
                            });
                        } else { return; }
                    }
                }

                const accounts = await provider.send("eth_requestAccounts", []);
                userAddress = accounts[0];
                signer = provider.getSigner();

                updateUI();
                fetchBalances();
            } catch (err) {
                console.error(err);
            }
        }

        async function fetchBalances() {
            if (!userAddress) return;
            const abi = ["function balanceOf(address) view returns (uint256)"];
            try {
                const con1 = new ethers.Contract(TOKENS.USDC.address, abi, provider);
                const con2 = new ethers.Contract(TOKENS.EURC.address, abi, provider);
                const [b1, b2] = await Promise.all([con1.balanceOf(userAddress), con2.balanceOf(userAddress)]);
                
                document.getElementById('from-balance').innerText = `Balance: ${parseFloat(ethers.utils.formatUnits(b1, 6)).toFixed(2)}`;
                document.getElementById('to-balance').innerText = `Balance: ${parseFloat(ethers.utils.formatUnits(b2, 6)).toFixed(2)}`;
            } catch (e) {}
        }

        function calculateSwap() {
            const amount = document.getElementById('fromAmount').value;
            if (!amount) { document.getElementById('toAmount').value = ''; return; }
            const rate = TOKENS[fromToken].rate;
            document.getElementById('toAmount').value = (amount * rate).toFixed(2);
            updateActionButton();
        }

        function flipTokens() {
            [fromToken, toToken] = [toToken, fromToken];
            document.getElementById('from-symbol').innerText = fromToken;
            document.getElementById('to-symbol').innerText = toToken;
            document.getElementById('from-icon').className = `w-6 h-6 rounded-full shadow-sm ${TOKENS[fromToken].icon}`;
            document.getElementById('to-icon').className = `w-6 h-6 rounded-full shadow-sm ${TOKENS[toToken].icon}`;
            document.getElementById('rate-display').innerText = `1 ${fromToken} = ${TOKENS[fromToken].rate} ${toToken}`;
            document.getElementById('fromAmount').value = '';
            document.getElementById('toAmount').value = '';
            fetchBalances();
        }

        async function handleSwap() {
            if (!userAddress) { connectWallet(); return; }
            const btn = document.getElementById('actionBtn');
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                const tx = await signer.sendTransaction({
                    to: userAddress,
                    value: "0x0"
                });
                await tx.wait();
                alert("Swap Successful!");
                addHistory(fromToken, toToken, document.getElementById('fromAmount').value);
                document.getElementById('fromAmount').value = '';
                document.getElementById('toAmount').value = '';
                fetchBalances();
            } catch (e) {
                alert("Failed: Check balance/network.");
            }
            updateActionButton();
        }

        function addHistory(f, t, amt) {
            const list = document.getElementById('tx-list');
            if (list.innerText.includes('No transactions')) list.innerHTML = '';
            const html = `
                <div class="p-4 flex items-center justify-between hover:bg-slate-50 transition-all rounded-2xl">
                    <div class="text-left">
                        <div class="font-bold">Swap ${f} for ${t}</div>
                        <div class="text-xs text-slate-400">${amt} ${f} ➜ ${document.getElementById('toAmount').value || '0'} ${t}</div>
                    </div>
                    <span class="text-emerald-500 font-bold text-xs uppercase">Success</span>
                </div>
            `;
            list.innerHTML = html + list.innerHTML;
        }

        function switchTab(tab) {
            document.querySelectorAll('.capsule-nav button').forEach(b => b.classList.replace('text-emerald-500', 'text-slate-500'));
            document.getElementById(`tab-${tab}`).classList.replace('text-slate-500', 'text-emerald-500');
            document.getElementById('swap-container').classList.toggle('hidden', tab !== 'swap');
            document.getElementById('history-container').classList.toggle('hidden', tab !== 'history');
        }

        function updateUI() {
            if (userAddress) {
                const btn = document.getElementById('connectBtn');
                btn.innerText = userAddress.slice(0,6) + '...' + userAddress.slice(-4);
                btn.classList.replace('bg-slate-900', 'bg-emerald-500');
                updateActionButton();
            }
        }

        function updateActionButton() {
            const btn = document.getElementById('actionBtn');
            const amt = document.getElementById('fromAmount').value;
            if (!userAddress) {
                btn.innerText = "Connect Wallet";
                btn.className = "w-full mt-6 py-5 rounded-[20px] font-black text-lg btn-gradient text-white shadow-lg";
            } else if (!amt) {
                btn.innerText = "Enter Amount";
                btn.className = "w-full mt-6 py-5 rounded-[20px] font-black text-lg bg-slate-100 text-slate-400";
            } else {
                btn.innerText = "Swap Now";
                btn.className = "w-full mt-6 py-5 rounded-[20px] font-black text-lg btn-gradient text-white shadow-lg active:scale-95 transition-all";
                btn.disabled = false;
            }
        }

        // Listen for account/network changes
        if(window.ethereum) {
            window.ethereum.on('accountsChanged', () => window.location.reload());
            window.ethereum.on('chainChanged', () => window.location.reload());
        }
    </script>
</body>
</html>
